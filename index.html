<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CyberRegs — Plataforma Educativa de Ciberseguridad</title>
  <meta name="description" content="Plataforma educativa sobre normativas y marcos de referencia de ciberseguridad." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/darkmode.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="app-header" role="banner">
    <div class="header-inner">
      <a href="#" class="brand" data-view="home" aria-label="CyberRegs - Inicio">
        <svg class="brand-icon" viewBox="0 0 40 40" aria-hidden="true">
          <circle cx="20" cy="20" r="18" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M20 7 L29 12.5 L29 22 Q29 31 20 35 Q11 31 11 22 L11 12.5 Z" fill="currentColor" opacity="0.18" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M15.5 20.5 L18.5 23.5 L24.5 17" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">CyberRegs</span>
      </a>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="main-nav" role="navigation" aria-label="Navegacion principal">
        <ul class="nav-list" role="list">
          <li><a href="#" class="nav-link active" data-view="home">Inicio</a></li>
          <li><a href="#" class="nav-link" data-view="regulations">Normativas</a></li>
          <li><a href="#" class="nav-link" data-view="frameworks">Frameworks</a></li>
          <li><a href="#" class="nav-link" data-view="comparator">Comparador</a></li>
          <li><a href="#" class="nav-link" data-view="timeline">Timeline</a></li>
          <li><a href="#" class="nav-link" data-view="quiz">Quiz</a></li>
          <li><a href="#" class="nav-link" data-view="dashboard">Mi Progreso</a></li>
        </ul>
      </nav>
      <div class="header-actions">
        <div class="search-wrapper" role="search">
          <label for="global-search" class="sr-only">Busqueda global</label>
          <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15 L19 19" stroke-linecap="round"/></svg>
          <input type="search" id="global-search" class="search-input" placeholder="Buscar normativas, frameworks..." aria-label="Busqueda global" autocomplete="off" />
          <div id="search-results" class="search-dropdown" role="listbox"></div>
        </div>
        <button id="dark-mode-toggle" class="icon-btn" aria-label="Cambiar modo oscuro">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        </button>
      </div>
    </div>
  </header>
  <main id="app-root" class="app-root" role="main" aria-live="polite"></main>
  <div id="toast-container" class="toast-container" aria-live="assertive" role="status"></div>
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>
  <script>
    window.onerror = function(msg, src, line) {
      document.getElementById('app-root').innerHTML =
        '<div style="padding:2rem;color:red;font-family:monospace">'
        + '<h2>ERROR JS</h2><p>' + msg + '</p><p>' + src + ':' + line + '</p></div>';
    };
    window.addEventListener('unhandledrejection', function(e) {
      document.getElementById('app-root').innerHTML =
        '<div style="padding:2rem;color:red;font-family:monospace">'
        + '<h2>ERROR MODULO</h2><pre>' + (e.reason?.stack || e.reason) + '</pre></div>';
    });
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
